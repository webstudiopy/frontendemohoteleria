<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotelería — Habitaciones</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="mark">H</div>
      <div class="name">Hotelería<span>Panel administrativo</span></div>
    </div>

    <div class="nav-group-label">General</div>
    <a class="nav-link" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Panel principal
    </a>

    <div class="nav-group-label">Operación</div>
    <a class="nav-link active" href="habitaciones.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V8l8-5 8 5v13"/><path d="M9 21v-6h6v6"/></svg>
      Habitaciones
    </a>
    <a class="nav-link" href="reservas.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      Reservas
    </a>
    <a class="nav-link" href="huespedes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20.5c1.6-3.6 4.4-5.5 7.5-5.5s5.9 1.9 7.5 5.5"/></svg>
      Huéspedes
    </a>

    <div class="nav-group-label">Administración</div>
    <a class="nav-link" href="facturacion.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
      Facturación
    </a>
    <a class="nav-link" href="reportes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
      Reportes
    </a>

    <div class="sidebar-footer">
      <div class="sucursal-pill">
        <span class="dot"></span>
        <span class="txt" data-sucursal-pill></span>
      </div>
      <a class="logout-link" href="#" onclick="logout(); return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Cerrar sesión
      </a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h1>Habitaciones</h1>
        <div class="subtitle" id="subHabitaciones"></div>
      </div>
      <div class="topbar-right">
        <div class="currency-toggle">
          <button data-currency="PYG">Gs</button>
          <button data-currency="USD">US$</button>
          <button data-currency="BRL">R$</button>
        </div>
        <div class="user-chip">
          <div class="avatar" data-user-avatar></div>
          <div class="info"><b data-user-name></b><small data-user-role></small></div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="buscador" placeholder="Buscar por número de habitación...">
        </div>
        <div class="filters">
          <select class="chip-select" id="filtroEstado">
            <option value="">Todos los estados</option>
            <option value="disponible">Disponible</option>
            <option value="ocupada">Ocupada</option>
            <option value="limpieza">Limpieza</option>
            <option value="mantenimiento">Mantenimiento</option>
          </select>
          <select class="chip-select" id="filtroTipo">
            <option value="">Todos los tipos</option>
            <option value="Individual">Individual</option>
            <option value="Doble">Doble</option>
            <option value="Suite">Suite</option>
          </select>
          <button class="btn btn-accent btn-sm" onclick="abrirModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Nueva habitación
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>N.º</th><th>Piso</th><th>Tipo</th><th>Precio / noche</th><th>Estado</th><th>Huésped actual</th><th></th>
              </tr>
            </thead>
            <tbody id="tablaHabitaciones"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal nueva habitación -->
<div class="modal-overlay" id="modalHabitacion">
  <div class="modal">
    <div class="modal-head">
      <h3>Nueva habitación</h3>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Número de habitación <span class="req">*</span></label>
          <input type="text" placeholder="Ej. 131" id="nuevoNumero">
        </div>
        <div class="field">
          <label>Piso <span class="req">*</span></label>
          <input type="number" placeholder="Ej. 1" id="nuevoPiso">
        </div>
      </div>
      <div class="field">
        <label>Tipo de habitación <span class="req">*</span></label>
        <select id="nuevoTipo">
          <option>Individual</option>
          <option>Doble</option>
          <option>Suite</option>
        </select>
      </div>
      <div class="field">
        <label>Precio por noche (Gs.) <span class="req">*</span></label>
        <div class="prefix-input">
          <span>Gs</span>
          <input type="text" placeholder="320.000" id="nuevoPrecio">
        </div>
      </div>
      <div class="field mb-0">
        <label>Estado inicial</label>
        <select id="nuevoEstado">
          <option value="disponible">Disponible</option>
          <option value="limpieza">En limpieza</option>
          <option value="mantenimiento">Mantenimiento</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="cerrarModal()">Guardar habitación</button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  requireAuth();
  const suc = getSucursalActual();
  let habitaciones = generarHabitaciones(suc);

  document.getElementById('subHabitaciones').textContent = `${suc.corto} · Numeración ${suc.prefijoHabitacion}xx · ${suc.totalHabitaciones} habitaciones`;

  function render(){
    const cur = getCurrentCurrency();
    const texto = document.getElementById('buscador').value.toLowerCase();
    const estado = document.getElementById('filtroEstado').value;
    const tipo = document.getElementById('filtroTipo').value;

    const filtradas = habitaciones.filter(h=>{
      return h.numero.toLowerCase().includes(texto)
        && (estado === '' || h.estado === estado)
        && (tipo === '' || h.tipo === tipo);
    });

    document.getElementById('tablaHabitaciones').innerHTML = filtradas.map(h => `
      <tr>
        <td class="cell-strong mono">${h.numero}</td>
        <td>Piso ${h.piso}</td>
        <td>${h.tipo}</td>
        <td class="mono cell-strong">${formatMoney(h.precioPYG, cur)}</td>
        <td><span class="badge badge-${h.estado}">${h.estado.charAt(0).toUpperCase()+h.estado.slice(1)}</span></td>
        <td class="cell-muted">${h.huesped ? h.huesped : '—'}</td>
        <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="abrirModal()">Editar</button></td>
      </tr>
    `).join('');
  }

  document.getElementById('buscador').addEventListener('input', render);
  document.getElementById('filtroEstado').addEventListener('change', render);
  document.getElementById('filtroTipo').addEventListener('change', render);
  window.addEventListener('currencychange', render);

  function abrirModal(){ document.getElementById('modalHabitacion').classList.add('open'); }
  function cerrarModal(){ document.getElementById('modalHabitacion').classList.remove('open'); }

  render();
</script>
</body>
</html>
