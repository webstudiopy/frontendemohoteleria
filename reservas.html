<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotelería — Reservas</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="mobile-topbar">
  <div class="brandmark"><div class="mark">H</div><span class="brandname">Hotelería</span></div>
  <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Abrir menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</div>
<div class="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="mark">H</div>
      <div class="name">Hotelería<span>Panel administrativo</span></div>
    </div>

    <div class="nav-group-label">General</div>
    <a class="nav-link" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Panel principal
    </a>

    <div class="nav-group-label">Operación</div>
    <a class="nav-link" href="habitaciones.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V8l8-5 8 5v13"/><path d="M9 21v-6h6v6"/></svg>
      Habitaciones
    </a>
    <a class="nav-link active" href="reservas.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      Reservas
    </a>
    <a class="nav-link" href="huespedes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20.5c1.6-3.6 4.4-5.5 7.5-5.5s5.9 1.9 7.5 5.5"/></svg>
      Huéspedes
    </a>

    <div class="nav-group-label">Administración</div>
    <a class="nav-link" href="facturacion.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
      Facturación
    </a>
    <a class="nav-link" href="reportes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
      Reportes
    </a>

    <div class="sidebar-footer">
      <div class="sucursal-pill">
        <span class="dot"></span>
        <span class="txt" data-sucursal-pill></span>
      </div>
      <a class="logout-link" href="#" onclick="logout(); return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Cerrar sesión
      </a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h1>Reservas</h1>
        <div class="subtitle" id="subReservas"></div>
      </div>
      <div class="topbar-right">
        <div class="currency-toggle">
          <button data-currency="PYG">Gs</button>
          <button data-currency="USD">US$</button>
          <button data-currency="BRL">R$</button>
        </div>
        <div class="user-chip">
          <div class="avatar" data-user-avatar></div>
          <div class="info"><b data-user-name></b><small data-user-role></small></div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="buscador" placeholder="Buscar por huésped o código...">
        </div>
        <div class="filters">
          <select class="chip-select" id="filtroEstado">
            <option value="">Todos los estados</option>
            <option value="confirmada">Confirmada</option>
            <option value="pendiente">Pendiente</option>
            <option value="cancelada">Cancelada</option>
          </select>
          <button class="btn btn-accent btn-sm" onclick="abrirModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Nueva reserva
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Código</th><th>Huésped</th><th>Habitación</th><th>Tipo</th><th>Check-in</th><th>Check-out</th><th>Noches</th><th>Total</th><th>Estado</th><th></th>
              </tr>
            </thead>
            <tbody id="tablaReservas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal nueva reserva -->
<div class="modal-overlay" id="modalReserva">
  <div class="modal">
    <div class="modal-head">
      <h3>Nueva reserva</h3>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Huésped <span class="req">*</span></label>
        <input type="text" placeholder="Nombre y apellido" id="rHuesped">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Habitación <span class="req">*</span></label>
          <select id="rHabitacion"></select>
        </div>
        <div class="field">
          <label>Moneda de la reserva</label>
          <select id="rMoneda">
            <option value="PYG">Guaraníes (Gs)</option>
            <option value="USD">Dólares (US$)</option>
            <option value="BRL">Reales (R$)</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Check-in <span class="req">*</span></label>
          <input type="date" id="rCheckin">
        </div>
        <div class="field">
          <label>Check-out <span class="req">*</span></label>
          <input type="date" id="rCheckout">
        </div>
      </div>
      <div class="field mb-0">
        <label>Notas</label>
        <textarea rows="3" placeholder="Pedidos especiales, observaciones..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="cerrarModal()">Crear reserva</button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  requireAuth();
  const suc = getSucursalActual();
  let reservas = generarReservas(suc);
  let habitaciones = generarHabitaciones(suc);

  document.getElementById('subReservas').textContent = `${suc.corto} · ${reservas.length} reservas registradas`;
  document.getElementById('rHabitacion').innerHTML = habitaciones.map(h=>`<option>${h.numero} — ${h.tipo}</option>`).join('');

  function render(){
    const cur = getCurrentCurrency();
    const texto = document.getElementById('buscador').value.toLowerCase();
    const estado = document.getElementById('filtroEstado').value;

    const filtradas = reservas.filter(r=>{
      return (r.huesped.toLowerCase().includes(texto) || r.id.toLowerCase().includes(texto))
        && (estado === '' || r.estado === estado);
    });

    document.getElementById('tablaReservas').innerHTML = filtradas.map(r => `
      <tr>
        <td class="cell-strong mono">${r.id}</td>
        <td>${r.huesped}</td>
        <td class="mono">${r.habitacion}</td>
        <td class="cell-muted">${r.tipo}</td>
        <td class="cell-muted">${r.checkin}</td>
        <td class="cell-muted">${r.checkout}</td>
        <td>${r.noches}</td>
        <td class="mono cell-strong">${formatMoney(r.totalPYG, cur)}</td>
        <td><span class="badge badge-${r.estado}">${r.estado.charAt(0).toUpperCase()+r.estado.slice(1)}</span></td>
        <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="abrirModal()">Ver</button></td>
      </tr>
    `).join('');
  }

  document.getElementById('buscador').addEventListener('input', render);
  document.getElementById('filtroEstado').addEventListener('change', render);
  window.addEventListener('currencychange', render);

  function abrirModal(){ document.getElementById('modalReserva').classList.add('open'); }
  function cerrarModal(){ document.getElementById('modalReserva').classList.remove('open'); }

  render();
</script>
</body>
</html>
